<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Andes Intelligence V9</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#1c2b36,#284b63);color:white;}
h1{text-align:center;color:#00ff7f;margin-top:40px;}
.search-box{text-align:center;margin:20px;}
select,input{padding:8px;border-radius:5px;border:none;}
button{padding:8px 15px;background:#00ff7f;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
table{width:95%;margin:30px auto;border-collapse:collapse;background:white;color:black;}
th{background:black;color:#00ff7f;padding:8px;}
td{padding:8px;border-bottom:1px solid #ddd;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);}
.modal-content{background:white;color:black;padding:20px;width:300px;margin:100px auto;border-radius:8px;}
</style>

<script>
function abrirModal(){document.getElementById("modal").style.display="block";}
function cerrarModal(){document.getElementById("modal").style.display="none";}
</script>

</head>
<body>

<h1>ANDES INTELLIGENCE V9</h1>

<div class="search-box">
<form method="GET">
<select name="base">
{% for e in empresas %}
<option value="{{ e }}">{{ e }}</option>
{% endfor %}
</select>

<select name="comp">
{% for e in empresas %}
<option value="{{ e }}">{{ e }}</option>
{% endfor %}
</select>

<input name="q" placeholder="Buscar producto..." value="{{ q }}">
<button type="submit">Comparar</button>
<button type="button" onclick="abrirModal()">+ Empresa</button>
</form>
</div>

{% if resultados %}
<table>
<tr>
<th>Descripción</th>
<th>Precio Base</th>
<th>Precio Competidor</th>
<th>Diferencia</th>
<th>Match %</th>
</tr>

{% for r in resultados %}
<tr>
<td>{{ r.descripcion }}</td>
<td>${{ r.precio_base }}</td>
<td>${{ r.precio_comp }}</td>
<td>${{ r.diferencia }}</td>
<td>{{ r.score }}%</td>
</tr>
{% endfor %}
</table>
{% endif %}

<div id="modal" class="modal">
<div class="modal-content">
<h3>Agregar Empresa</h3>
<form action="/subir" method="POST" enctype="multipart/form-data">
<input type="text" name="nombre" placeholder="Nombre Empresa" required><br><br>
<input type="file" name="archivo" required><br><br>
<button type="submit">Subir</button>
<button type="button" onclick="cerrarModal()">Cerrar</button>
</form>
</div>
</div>

</body>
</html>
