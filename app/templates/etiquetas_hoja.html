<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hoja de etiquetas</title>

<style>
@page {
    size: letter;
    margin: 0.7cm;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* GRILLA HOJA */
.hoja {
    display: grid;
    grid-template-columns: repeat(4, 4.8cm);
    grid-template-rows: repeat(6, 3.8cm);
    gap: 0.2cm; /* más respiración */
    justify-content: center;
}

/* ETIQUETA */
.etiqueta {
    width: 4.8cm;
    height: 3.8cm;
    border: 1px solid #ddd;
    padding: 4px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    height: 32px;
}

.datos {
    text-align: right;
    font-size: 6px;
}

/* CENTRO */
.centro {
    text-align: center;
}

.descripcion {
    font-size: 9px;
    font-weight: 600;
}

.codigo {
    font-size: 20px;
    font-weight: 900;
}

/* INFERIOR */
.inferior {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.barcode img {
    height: 30px;
}

.qr img {
    width: 25px;
}
</style>
</head>

<body onload="window.print()">

<div class="hoja">

{% for i in range(cantidad) %}
<div class="etiqueta">

    <div class="header">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo_andes.png') }}">
        </div>

        <div class="datos">
            ANDES AUTO PARTS LTDA<br>
            +56 9 2815 2026
        </div>
    </div>

    <div class="centro">
        <div class="descripcion">
            {{ producto.descripcion[:30] }}
        </div>

        <div class="codigo">
            {{ producto.codigo }}
        </div>
    </div>

    <div class="inferior">
        <div class="barcode">
            <img src="data:image/png;base64,{{ barcode_img }}">
        </div>

        <div class="qr">
            <img src="data:image/png;base64,{{ qr_img }}">
        </div>
    </div>

</div>
{% endfor %}

</div>

</body>
</html>
