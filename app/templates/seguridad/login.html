<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>Login | Andes Auto Parts</title>
<link rel="icon" type="image/png" sizes="32x32" href="{{ 'logo_andes.png' | static_or_cloud }}">
<link rel="shortcut icon" href="{{ 'logo_andes.png' | static_or_cloud }}">
<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(ellipse 120% 80% at 50% 20%, #1e3a5f 0%, #0f172a 45%, #020617 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}
.login-box {
  width: 100%;
  max-width: 380px;
  background: rgba(15, 23, 42, 0.95);
  padding: 36px 32px;
  border-radius: 20px;
  border: 1px solid rgba(148, 163, 184, 0.18);
  box-shadow: 0 0 48px rgba(56, 189, 248, 0.28);
  text-align: center;
}
.login-logo-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.login-brand-img {
  width: 150px;
  height: 150px;
  object-fit: contain;
  opacity: 0.96;
  filter:
    drop-shadow(0 0 12px rgba(56, 189, 248, 0.28))
    drop-shadow(0 0 28px rgba(37, 99, 235, 0.18))
    drop-shadow(0 10px 24px rgba(0, 0, 0, 0.34));
}
.login-box h2 {
  color: #fff;
  margin: 0 0 24px;
  font-size: 1.2rem;
  font-weight: 600;
}
.login-box input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  background: #0f172a;
  color: #fff;
  font-size: 15px;
}
.login-box input::placeholder {
  color: rgba(255, 255, 255, 0.55);
}
.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
}
.error {
  margin-top: 14px;
  color: #fca5a5;
  font-size: 13px;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo-wrap">
    <img class="login-brand-img" src="{{ 'logo_andes.png' | static_or_cloud }}" width="56" height="56" alt="Andes Auto Parts">
  </div>
  <h2>Andes Auto Parts</h2>
  <form method="POST">
    {# El backend lee "username" / "password" (login2) #}
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input name="username" placeholder="Usuario" required autocomplete="username" autocapitalize="none">
    <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
    <button type="submit">Ingresar</button>
  </form>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</div>
</body>
</html>
