<section class="form-card">
    <h1 class="page-title">Editar Usuario</h1>

    <form method="POST" action="{{ url_for('seguridad.editar_usuario', id=user.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-grid">
            <div class="field">
                <label>Nombre</label>
                <input name="nombre" value="{{ user.nombre }}" required>
            </div>

            <div class="field">
                <label>Usuario</label>
                <input name="usuario" value="{{ user.usuario }}" required>
            </div>

            <div class="field">
                <label>Nueva contraseña</label>
                <input type="password" name="password">
                <small>Dejar vacío para no cambiar</small>
            </div>

            <div class="field">
                <label>Rol</label>
                <select name="rol">
                    {% for r in roles %}
                    <option value="{{ r.id }}" {% if r.id == user.rol_id %}selected{% endif %}>
                        {{ r.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="field field-full">
                <label>
                    <input type="checkbox" name="activo" {% if user.activo %}checked{% endif %}>
                    Activo
                </label>
            </div>

            <div class="field field-full" style="margin-top:8px;">
                <label>RRHH / Nómina</label>
                <small>Datos previsionales y bancarios (opcional).</small>
            </div>
            <div class="field">
                <label>Salud</label>
                <select name="rrhh_salud_tipo">
                    <option value="">—</option>
                    <option value="FONASA" {% if rrhh and rrhh.salud_tipo == 'FONASA' %}selected{% endif %}>FONASA</option>
                    <option value="ISAPRE" {% if rrhh and rrhh.salud_tipo == 'ISAPRE' %}selected{% endif %}>ISAPRE</option>
                </select>
            </div>
            <div class="field">
                <label>Isapre (si aplica)</label>
                <input name="rrhh_salud_entidad" id="saludEntidad" list="isapreChileList" value="{{ rrhh.salud_entidad if rrhh else '' }}" placeholder="Ej: Colmena">
            </div>
            <div class="field">
                <label>N° contrato/afiliado</label>
                <input name="rrhh_salud_numero" value="{{ rrhh.salud_numero if rrhh else '' }}" placeholder="Opcional">
            </div>
            <div class="field">
                <label>AFP</label>
                <input name="rrhh_afp_nombre" list="afpChileList" value="{{ rrhh.afp_nombre if rrhh else '' }}" placeholder="Ej: Habitat">
            </div>
            <div class="field">
                <label>Banco</label>
                <input name="rrhh_banco_nombre" list="bancoChileList" value="{{ rrhh.banco_nombre if rrhh else '' }}" placeholder="Ej: BancoEstado" required>
            </div>
            <div class="field">
                <label>Tipo cuenta</label>
                <select name="rrhh_banco_tipo_cuenta" required>
                    {% set tc = (rrhh.banco_tipo_cuenta if rrhh else '') %}
                    <option value="">—</option>
                    <option value="rut" {% if tc == 'rut' %}selected{% endif %}>Cuenta RUT</option>
                    <option value="vista" {% if tc == 'vista' %}selected{% endif %}>Vista</option>
                    <option value="corriente" {% if tc == 'corriente' %}selected{% endif %}>Corriente</option>
                    <option value="ahorro" {% if tc == 'ahorro' %}selected{% endif %}>Ahorro</option>
                </select>
            </div>
            <div class="field">
                <label>N° cuenta</label>
                <input name="rrhh_banco_numero_cuenta" value="{{ rrhh.banco_numero_cuenta if rrhh else '' }}" placeholder="Ej: 12345678" required>
            </div>
            <div class="field field-full">
                <label><input type="checkbox" name="rrhh_afc_afiliado" {% if rrhh is none or rrhh.afc_afiliado %}checked{% endif %}> AFC afiliado</label>
                <span style="margin-left:14px;">Comisión %</span>
                <input name="rrhh_comision_pct" type="number" min="0" max="100" step="0.01" value="{{ rrhh.comision_pct if rrhh else 0 }}" style="width:120px;">
            </div>
        </div>
        <datalist id="afpChileList">
            <option value="AFP Capital"></option>
            <option value="AFP Cuprum"></option>
            <option value="AFP Habitat"></option>
            <option value="AFP Modelo"></option>
            <option value="AFP PlanVital"></option>
            <option value="AFP Provida"></option>
            <option value="AFP Uno"></option>
        </datalist>
        <datalist id="isapreChileList">
            <option value="Banmédica"></option>
            <option value="Colmena"></option>
            <option value="Consalud"></option>
            <option value="Cruz Blanca"></option>
            <option value="Esencial"></option>
            <option value="Fundación"></option>
            <option value="Nueva Masvida"></option>
            <option value="Vida Tres"></option>
        </datalist>
        <datalist id="bancoChileList">
            <option value="BancoEstado"></option>
            <option value="Banco de Chile"></option>
            <option value="Banco BCI"></option>
            <option value="Banco Santander"></option>
            <option value="Banco Itaú"></option>
            <option value="Scotiabank"></option>
            <option value="Banco Security"></option>
            <option value="Banco BICE"></option>
            <option value="Banco Internacional"></option>
            <option value="Banco Consorcio"></option>
            <option value="Banco Falabella"></option>
            <option value="Banco Ripley"></option>
            <option value="Banco BTG Pactual Chile"></option>
            <option value="Coopeuch"></option>

            <!-- Cuentas digitales / emisores prepago (CMF) -->
            <option value="Tenpo"></option>
            <option value="Mercado Pago"></option>
            <option value="Los Héroes"></option>
            <option value="Tricard"></option>
            <option value="SumUp"></option>
            <option value="Global Card"></option>
            <option value="Digital Payments Prepago"></option>
            <option value="Compañía Emisora de Medios de Pago Digitales"></option>
            <option value="Los Andes Tarjetas de Prepago"></option>
            <option value="Inversiones LP"></option>
        </datalist>
        <script>
        (function () {
            'use strict';
            var sel = document.querySelector('select[name="rrhh_salud_tipo"]');
            var inp = document.getElementById('saludEntidad');
            function sync() {
                if (!sel || !inp) return;
                var v = String(sel.value || '').toUpperCase();
                var enable = (v === 'ISAPRE');
                inp.disabled = !enable;
                if (!enable) inp.value = '';
            }
            if (sel) sel.addEventListener('change', sync);
            sync();
        })();
        </script>

        <div class="actions" style="margin-top:18px; justify-content:flex-end;">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
    </form>
</section>
