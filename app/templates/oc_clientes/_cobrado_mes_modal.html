<style>
.oc-cobrado-modal {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    padding: 16px; background: rgba(15, 23, 42, 0.5); z-index: 1250;
}
.oc-cobrado-modal.open { display: flex; }
.oc-cobrado-card {
    width: min(920px, calc(100vw - 24px)); max-height: calc(100vh - 32px);
    overflow: hidden; display: flex; flex-direction: column;
    background: #fff; border: 1px solid #dbe3ef; border-radius: 12px;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
}
.oc-cobrado-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid #e2e8f0; background: #f8fafc;
}
.oc-cobrado-head h3 { margin: 0 0 2px; font-size: 15px; font-weight: 700; color: #0f172a; }
.oc-cobrado-head p { margin: 0; font-size: 11px; color: #64748b; }
.oc-cobrado-summary {
    display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: #475569;
    padding: 8px 18px; border-bottom: 1px solid #f1f5f9; background: #fff;
}
.oc-cobrado-summary strong { color: #0f172a; }
.oc-cobrado-body { overflow: auto; padding: 0 0 8px; flex: 1; }
.oc-cobrado-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.oc-cobrado-table thead th {
    position: sticky; top: 0; z-index: 1;
    padding: 7px 12px; text-align: left; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; color: #64748b;
    background: #f8fafc; border-bottom: 1px solid #e2e8f0;
}
.oc-cobrado-table tbody td {
    padding: 7px 12px; border-bottom: 1px solid #f1f5f9; color: #475569; vertical-align: top;
}
.oc-cobrado-table tbody tr:hover td { background: #fafbfc; }
.oc-cobrado-table td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.oc-cobrado-table a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
.oc-cobrado-table a:hover { text-decoration: underline; }
.oc-cobrado-tag {
    display: inline-flex; padding: 1px 6px; border-radius: 999px; font-size: 9px; font-weight: 600;
    background: #dbeafe; color: #1d4ed8;
}
.oc-cobrado-empty { padding: 28px 18px; text-align: center; color: #94a3b8; font-size: 12px; }
.oc-cobrado-foot {
    padding: 10px 18px; border-top: 1px solid #e2e8f0; text-align: right; background: #fff;
}
.oc-cobrado-loading { padding: 32px 18px; text-align: center; color: #64748b; font-size: 12px; }
</style>

<div id="ocCobradoModal" class="oc-cobrado-modal" aria-hidden="true">
    <div class="oc-cobrado-card" role="dialog" aria-modal="true" aria-labelledby="ocCobradoTitle">
        <div class="oc-cobrado-head">
            <div>
                <h3 id="ocCobradoTitle">Cobros del mes</h3>
                <p id="ocCobradoSub">Historial de abonos y facturas asociadas</p>
            </div>
            <button type="button" class="btn sm" id="ocCobradoClose" aria-label="Cerrar">✕</button>
        </div>
        <div class="oc-cobrado-summary" id="ocCobradoSummary" style="display:none;"></div>
        <div class="oc-cobrado-body" id="ocCobradoBody">
            <div class="oc-cobrado-loading" id="ocCobradoLoading">Cargando…</div>
        </div>
        <div class="oc-cobrado-foot">
            <button type="button" class="btn sm outline" id="ocCobradoCloseFoot">Cerrar</button>
        </div>
    </div>
</div>

<script>
(function () {
    var modal = document.getElementById('ocCobradoModal');
    var body = document.getElementById('ocCobradoBody');
    var loading = document.getElementById('ocCobradoLoading');
    var summary = document.getElementById('ocCobradoSummary');
    var sub = document.getElementById('ocCobradoSub');
    var url = {{ url_cobrado_mes|tojson }};
    if (!modal || !body || !url) return;

    function fmt(n) {
        return '$' + Math.round(Number(n) || 0).toLocaleString('es-CL');
    }

    function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
    }

    function render(data) {
        sub.textContent = 'Abonos registrados en ' + (data.mes_label || 'el mes actual');
        summary.style.display = 'flex';
        summary.innerHTML =
            '<span>Total cobrado <strong>' + fmt(data.total_cobrado) + '</strong></span>' +
            '<span>Abonos <strong>' + (data.cantidad_abonos || 0) + '</strong></span>' +
            '<span>OC pagadas <strong>' + (data.cantidad_oc || 0) + '</strong></span>';

        var items = data.items || [];
        if (!items.length) {
            body.innerHTML = '<div class="oc-cobrado-empty">Sin cobros registrados este mes.</div>';
            return;
        }

        var html = '<table class="oc-cobrado-table"><thead><tr>' +
            '<th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Referencia</th>' +
            '<th>Método</th><th style="text-align:right;">Monto abono</th>' +
            '<th>OC</th><th>Factura</th><th style="text-align:right;">Total OC</th>' +
            '</tr></thead><tbody>';

        items.forEach(function (it) {
            var ordenes = it.ordenes || [];
            ordenes.forEach(function (oc, idx) {
                html += '<tr>';
                if (idx === 0) {
                    html += '<td rowspan="' + ordenes.length + '">' + esc(it.fecha_pago) + '</td>';
                    html += '<td rowspan="' + ordenes.length + '">' + esc(it.cliente_nombre) + '</td>';
                    html += '<td rowspan="' + ordenes.length + '">' +
                        (it.es_conjunto ? '<span class="oc-cobrado-tag">Conjunto</span>' : 'Individual') + '</td>';
                    html += '<td rowspan="' + ordenes.length + '">' + esc(it.referencia_pago || '—') + '</td>';
                    html += '<td rowspan="' + ordenes.length + '">' + esc(it.metodo_label || it.metodo_pago || '—') + '</td>';
                    html += '<td class="num" rowspan="' + ordenes.length + '"><strong>' + fmt(it.monto_abono) + '</strong></td>';
                }
                html += '<td><a href="' + esc(oc.detalle_url) + '">' + esc(oc.numero_oc) + '</a></td>';
                html += '<td>' + esc(oc.numero_factura) + '</td>';
                html += '<td class="num">' + fmt(oc.total) + '</td>';
                html += '</tr>';
            });
        });

        html += '</tbody></table>';
        body.innerHTML = html;
    }

    function openModal() {
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        body.innerHTML = '';
        if (loading) {
            loading.style.display = 'block';
            body.appendChild(loading);
        }
        summary.style.display = 'none';

        fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.ok) throw new Error('Error al cargar');
                render(data);
            })
            .catch(function () {
                body.innerHTML = '<div class="oc-cobrado-empty">No se pudo cargar el historial.</div>';
            });
    }

    document.getElementById('ocKpiCobradoMes')?.addEventListener('click', openModal);
    document.getElementById('ocKpiCobradoMes')?.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(); }
    });
    document.getElementById('ocCobradoClose')?.addEventListener('click', closeModal);
    document.getElementById('ocCobradoCloseFoot')?.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });
})();
</script>
