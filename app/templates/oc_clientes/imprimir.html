<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OC {{ oc.numero_oc }} | Andes Auto Parts</title>
    <style>
        body { margin: 0; background: #f1f5f9; font-family: Arial, sans-serif; }
        .oc-print-standalone-bar {
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e2e8f0;
            display: flex; gap: 8px; align-items: center;
        }
        .oc-print-standalone-wrap { max-width: 920px; margin: 20px auto; padding: 0 20px 28px; }
        .oc-print-standalone-sheet {
            background: #fff; padding: 28px 32px;
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1); border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: #fff; }
            .oc-print-standalone-wrap { margin: 0; padding: 0; max-width: none; }
            .oc-print-standalone-sheet { box-shadow: none; padding: 0; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="oc-print-standalone-bar no-print">
        <button type="button" onclick="window.print()" style="padding:6px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Imprimir</button>
        <button type="button" onclick="window.close()" style="padding:6px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Cerrar</button>
    </div>
    <div class="oc-print-standalone-wrap">
        <div class="oc-print-standalone-sheet">
            {% include 'oc_clientes/_imprimir_sheet.html' %}
        </div>
    </div>
</body>
</html>
