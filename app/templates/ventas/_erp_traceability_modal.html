{# Modal de historial / trazabilidad de producto (usa stock_control.js: #traceabilityModal, #traceabilityContenido) #}
<div id="traceabilityModal" class="psmodal no-print" style="display:none" aria-hidden="true">
    <div class="psbox erp-trace-box">
        <div class="pshead">
            <h3>Historial del producto</h3>
            <button type="button" class="ps-closex" id="productHistoryClose" aria-label="Cerrar">&times;</button>
        </div>
        <div id="traceabilityContenido" class="ps-scroll erp-trace-scroll"></div>
    </div>
</div>
