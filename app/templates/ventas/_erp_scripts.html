    let activeSearchRow = null;

    const initialRutLookupValue = rutLookup ? String(rutLookup.value || '').trim() : '';
    const initialPartyIdValue = hiddenPartyId ? String(hiddenPartyId.value || '').trim() : '';
    const initialProveedorIdValue = hiddenProveedorId ? String(hiddenProveedorId.value || '').trim() : '';
    const initialNotesValue = notesInput ? String(notesInput.value || '').trim() : '';

    function parseNum(value) {
        const number = Number(String(value || '').replace(',', '.').trim());
        return Number.isFinite(number) && number >= 0 ? number : 0;
    }
    function fmtMoney2(value) {
        const n = Number(String(value || '').replace(',', '.').trim());
        if (!Number.isFinite(n)) return '—';
        return '$' + n.toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    const MARGEN_MIN_CONFIRMA_OV = 30;
    function fmtCLP(value) {
        return '$' + Math.round(parseNum(value)).toLocaleString('es-CL');
    }
    function esc(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
    function normalize(value) {
        return String(value || '').trim().toLowerCase();
    }
    function notifyUi(message, tone, title) {
        const text = String(message || 'No se pudo completar la acción');
        if (typeof window.showDocActionModal === 'function') {
            window.showDocActionModal(text, tone || 'error', title || 'Atención');
            return;
        }
        window.alert(text);
    }
    function currentDocumentId() {
        return parseInt((loadedDocumentIdInput && loadedDocumentIdInput.value) || '0', 10) || 0;
    }
    function currentDocumentNumber() {
        return String((docNumberInput && docNumberInput.value) || '').trim().toUpperCase();
    }
    function hasAnyOrderInput() {
        if (currentDocumentId() > 0) return true;
        const currentPartyId = hiddenPartyId ? String(hiddenPartyId.value || '').trim() : '';
        const currentProveedorId = hiddenProveedorId ? String(hiddenProveedorId.value || '').trim() : '';
        if (currentPartyId && currentPartyId !== initialPartyIdValue) return true;
        if (currentProveedorId && currentProveedorId !== initialProveedorIdValue) return true;
        const currentRutTyped = rutLookup ? String(rutLookup.value || '').trim() : '';
        if (currentRutTyped.length >= 7 && currentRutTyped !== initialRutLookupValue) return true;
        const currentNotes = notesInput ? String(notesInput.value || '').trim() : '';
        if (currentNotes.length >= 3 && currentNotes !== initialNotesValue) return true;
        if (itemsBody) {
            const hasLineData = Array.from(itemsBody.querySelectorAll('.item-row')).some(function (row) {
                const f = getRF(row);
                if (!f) return false;
                const code = String((f.codeInput && f.codeInput.value) || '').trim();
                const desc = String((f.descInput && f.descInput.value) || '').trim();
                const note = String((f.noteInput && f.noteInput.value) || '').trim();
                const unitPrice = parseNum((f.priceInput && f.priceInput.value) || 0);
                // La cantidad inicial (ej. 1) no debe disparar paneles en documento nuevo.
                return !!code || !!desc || !!note || unitPrice > 0;
            });
            if (hasLineData) return true;
        }
        return false;
    }
    function refreshProgressiveActionPanels() {
        const show = hasAnyOrderInput();
        [docActionsPanel, footerActionsPanel].forEach(function (panel) {
            if (!panel) return;
            panel.classList.toggle('is-soft-hidden', !show);
            panel.setAttribute('aria-hidden', show ? 'false' : 'true');
        });
    }
    function endpointWithId(base, id) {
        // url_for(..., documento_id=0) → .../factura/0/nota_credito — must replace /0/ in path, not trailing char
        return String(base || '').replace(/\/0\//, '/' + String(id) + '/');
    }
    function endpointWithNumber(base, number) {
        return String(base || '').replace('NUMERO_PLACEHOLDER', encodeURIComponent(String(number || '').trim().toUpperCase()));
    }
    function postJson(url, payload) {
        return fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify(payload || {})
        }).then(function (response) {
            return response.json().then(function (data) {
                if (!response.ok || !data.success) {
                    throw new Error((data && data.message) || 'Operacion no disponible');
                }
                return data;
            });
        });
    }
    function labelDocType(kind) {
        const map = {
            cotizacion: 'Cotizacion',
            orden_venta: 'Orden de Venta',
            orden_compra: 'Orden de Compra',
            factura: 'Factura',
            boleta: 'Boleta',
            factura_proveedor: 'Factura proveedor',
            nota_credito: 'Nota de Credito'
        };
        return map[String(kind || '').toLowerCase()] || String(kind || '').replace(/_/g, ' ');
    }
    function tracePaymentLine(node) {
        const t = String(node.type || '').toLowerCase();
        if (t !== 'factura' && t !== 'boleta') {
            return '';
        }
        const ep = String(node.estado_pago || 'pendiente').toLowerCase();
        if (ep === 'pagado') {
            const lab = node.metodo_pago_label || node.metodo_pago || '';
            const ref = String(node.pago_referencia || '').trim();
            let inner = 'Pagado';
            if (lab) {
                inner += ' · ' + esc(lab);
            }
            if (ref) {
                inner += ' · Ref. caja: ' + esc(ref);
            }
            return '<div class="meta trace-pay-line">Pago: <span class="meta-strong">' + inner + '</span></div>';
        }
        return '<div class="meta trace-pay-line">Pago: <span class="meta-strong">Pendiente de cobro en caja</span></div>';
    }
    function renderTrace(chain) {
        if (!traceList) return;
        if (!Array.isArray(chain) || !chain.length) {
            traceList.innerHTML = '<div class="trace-node"><div class="meta">Sin trazabilidad disponible.</div></div>';
            return;
        }
        const html = chain.map(function (node, index) {
            const total = Number(node.total || 0).toLocaleString('es-CL');
            return '' +
                '<div class="trace-step">' +
                    '<div class="trace-step-rail">' +
                        '<span class="trace-step-dot"></span>' +
                        '<span class="trace-step-line"></span>' +
                    '</div>' +
                    '<div class="trace-node">' +
                        '<div class="row1">' +
                            '<span class="tag">' + esc(labelDocType(node.type)) + '</span>' +
                            '<span class="num">' + esc(node.number || ('#' + node.id)) + '</span>' +
                        '</div>' +
                        '<div class="meta">Estado documento: <span class="meta-strong">' + esc(node.status || 'pendiente') + '</span> · Total: <span class="meta-strong">$' + total + '</span></div>' +
                        tracePaymentLine(node) +
                    '</div>' +
                '</div>' +
                '';
        }).join('');
        traceList.innerHTML = html;
    }
    function openTrace() {
        const numero = currentDocumentNumber();
        if (!numero) {
            window.alert('Carga un documento guardado antes de ver trazabilidad.');
            return;
        }
        if (!traceModal) return;
        traceModal.classList.add('open');
        if (traceList) traceList.innerHTML = '<div class="trace-node"><div class="meta">Cargando trazabilidad...</div></div>';
        fetch(endpointWithNumber(URL_API_TRACE, numero), { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function (response) {
                return response.json().then(function (data) {
                    if (!response.ok || !data.success) {
                        throw new Error((data && data.message) || 'No se pudo cargar trazabilidad');
                    }
                    return data;
                });
            })
            .then(function (data) {
                renderTrace(data.chain || []);
                if (traceHint) traceHint.textContent = 'Cadena desde documento raiz';
            })
            .catch(function (error) {
                if (traceList) traceList.innerHTML = '<div class="trace-node"><div class="meta">' + esc(error.message) + '</div></div>';
            });
    }
    function closeTrace() {
        if (traceModal) traceModal.classList.remove('open');
    }
    function getPartyDisplay(entity) {
        return entity ? (entity.empresa || entity.nombre || '') : '';
    }
    function getRF(row) {
        return {
            codeInput: row.querySelector('.item-codigo'),
            descInput: row.querySelector('.item-desc'),
            marcaSel: row.querySelector('.item-marca'),
            bodegaSel: row.querySelector('.item-bodega'),
            origenSel: row.querySelector('.item-origen-compra'),
            qtyInput: row.querySelector('.item-qty'),
            priceInput: row.querySelector('.item-price'),
            subtotalEl: row.querySelector('.item-subtotal'),
            stockEl: row.querySelector('.item-stock-row'),
            metaInput: row.querySelector('.item-modelo-input'),
            srchBtn: row.querySelector('.code-srch-btn'),
            histBtn: row.querySelector('.code-hist-btn'),
            margenInput: row.querySelector('.item-margen'),
            costoToggle: row.querySelector('.item-costo-toggle'),
            costoBanner: row.querySelector('.item-costo-banner'),
            costoVal: row.querySelector('.item-costo-val')
        };
    }
    function itemKey(data) {
        return [
            String(data.codigo || '').trim().toUpperCase(),
            String(data.marca || '').trim().toUpperCase(),
            String(data.bodega || '').trim(),
            String(data.origen_compra || '').trim().toLowerCase()
        ].join('|');
    }
    function findRegionData(regionName) {
        return chileGeo.find(function (item) {
            return normalize(item && item.nombre) === normalize(regionName);
        }) || null;
    }
    function updateInlineCities(regionName, selectedCity) {
        if (!icCiudad) return;
        const region = findRegionData(regionName);
        const cities = region && Array.isArray(region.comunas) ? region.comunas : [];

        icCiudad.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = 'Seleccionar ciudad';
        icCiudad.appendChild(placeholder);

        cities.forEach(function (city) {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            icCiudad.appendChild(option);
        });

        icCiudad.disabled = !regionName || !cities.length;
        if (!selectedCity) {
            icCiudad.value = '';
            return;
        }
        const exists = cities.some(function (city) {
            return normalize(city) === normalize(selectedCity);
        });
        icCiudad.value = exists ? selectedCity : '';
    }

    function applyIngresoRefToRow(row, ref, fetchOpts) {
        const fo = fetchOpts || {};
        const fields = getRF(row);
        const btn = fields.costoToggle;
        const banner = fields.costoBanner;
        const valEl = fields.costoVal;
        if (!btn || !banner || !valEl) return;
        if (ref && ref.costo_unitario_neto != null) {
            btn.hidden = false;
            btn.disabled = false;
            valEl.textContent = fmtMoney2(ref.costo_unitario_neto);
            row.dataset.costoIngresoNeto = String(ref.costo_unitario_neto);
        } else {
            btn.hidden = true;
            banner.hidden = true;
            valEl.textContent = '—';
            try { delete row.dataset.costoIngresoNeto; } catch (e1) { row.removeAttribute('data-costo-ingreso-neto'); }
            btn.setAttribute('aria-expanded', 'false');
            btn.innerHTML = '&#9654;';
        }
        if (String(DOC_TYPE || '').toLowerCase() === 'orden_venta' && ref && ref.precio_sugerido_neto != null) {
            if (!fo.skipPrecioMargen) {
                if (fields.priceInput) fields.priceInput.value = Number(ref.precio_sugerido_neto).toFixed(2);
                if (fields.margenInput && ref.margen_registrado_pct != null) {
                    const cur = String(fields.margenInput.value || '').trim();
                    if (!cur) fields.margenInput.value = String(ref.margen_registrado_pct);
                }
            } else if (fields.priceInput) {
                /* Documento ya guardado: el servidor tiene P. unit. efectivo; mostrar referencia lista del ingreso. */
                fields.priceInput.value = Number(ref.precio_sugerido_neto).toFixed(2);
            }
        }
    }
    function fetchIngresoRefForRow(row, fetchOpts) {
        const fo = fetchOpts || {};
        const fields = getRF(row);
        const code = (fields.codeInput && fields.codeInput.value || '').trim().toUpperCase();
        if (!code) {
            applyIngresoRefToRow(row, null, fo);
            return Promise.resolve();
        }
        const marca = fields.marcaSel ? fields.marcaSel.value : '';
        const bodega = fields.bodegaSel ? fields.bodegaSel.value : 'Bodega 1';
        const origen = fields.origenSel ? fields.origenSel.value : '';
        const u = URL_PRODUCTO + '?codigo=' + encodeURIComponent(code)
            + '&marca=' + encodeURIComponent(marca)
            + '&bodega=' + encodeURIComponent(bodega)
            + '&origen_compra=' + encodeURIComponent(origen || '');
        return fetch(u, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function (response) { return response.json(); })
            .then(function (data) {
                if (!data.success || !data.producto) {
                    applyIngresoRefToRow(row, null, fo);
                    return;
                }
                applyIngresoRefToRow(row, data.producto.ingreso_ref || null, fo);
            })
            .catch(function () {
                applyIngresoRefToRow(row, null, fo);
            });
    }
    function wireCostToggle(row) {
        const fields = getRF(row);
        if (!fields.costoToggle || fields.costoToggle.dataset.bound === '1') return;
        fields.costoToggle.dataset.bound = '1';
        fields.costoToggle.addEventListener('click', function () {
            if (!fields.costoBanner || fields.costoToggle.hidden) return;
            const isOpen = !fields.costoBanner.hidden;
            if (isOpen) {
                fields.costoBanner.hidden = true;
                fields.costoToggle.setAttribute('aria-expanded', 'false');
                fields.costoToggle.innerHTML = '&#9654;';
            } else {
                fields.costoBanner.hidden = false;
                fields.costoToggle.setAttribute('aria-expanded', 'true');
                fields.costoToggle.innerHTML = '&#9660;';
            }
        });
    }
    /** OV + costo ingreso + margen: subtotal = cant × costo/(1−m/100). No modifica P. unitario (referencia del ingreso). */
    function lineSubtotalAmount(row) {
        const fields = getRF(row);
        const qty = Math.max(0, parseInt((fields.qtyInput && fields.qtyInput.value) || '0', 10) || 0);
        if (String(DOC_TYPE || '').toLowerCase() === 'orden_venta') {
            const costRaw = row.dataset.costoIngresoNeto;
            const mgRaw = fields.margenInput ? String(fields.margenInput.value || '').trim() : '';
            if (costRaw != null && costRaw !== '' && mgRaw !== '') {
                const cost = parseFloat(String(costRaw).replace(',', '.'));
                const m = parseFloat(mgRaw.replace(',', '.'));
                if (Number.isFinite(cost) && cost > 0 && Number.isFinite(m) && m >= 0 && m < 100) {
                    const denom = 1 - m / 100;
                    if (denom > 0) return Math.round(qty * (cost / denom) * 100) / 100;
                }
            }
        }
        const price = parseNum(fields.priceInput ? fields.priceInput.value : 0);
        return Math.round(qty * price * 100) / 100;
    }
    /** Precio unitario a enviar al servidor cuando el subtotal sale de costo+margen (debe coincidir con lineSubtotalAmount/cant). */
    function effectiveUnitPrecioForSubmit(row) {
        if (String(DOC_TYPE || '').toLowerCase() !== 'orden_venta') return null;
        const fields = getRF(row);
        const qty = Math.max(0, parseInt((fields.qtyInput && fields.qtyInput.value) || '0', 10) || 0);
        if (qty <= 0) return null;
        const costRaw = row.dataset.costoIngresoNeto;
        const mgRaw = fields.margenInput ? String(fields.margenInput.value || '').trim() : '';
        if (costRaw == null || costRaw === '' || mgRaw === '') return null;
        const cost = parseFloat(String(costRaw).replace(',', '.'));
        const m = parseFloat(mgRaw.replace(',', '.'));
        if (!Number.isFinite(cost) || cost <= 0 || !Number.isFinite(m) || m < 0 || m >= 100) return null;
        const denom = 1 - m / 100;
        if (denom <= 0) return null;
        return cost / denom;
    }
    function onMargenOrCostoSubtotal(row) {
        updateRowSub(row);
    }
    function collectMargenBajoOV() {
        const out = [];
        if (String(DOC_TYPE || '').toLowerCase() !== 'orden_venta') return out;
        itemsBody.querySelectorAll('.item-row').forEach(function (row) {
            const f = getRF(row);
            const code = (f.codeInput && f.codeInput.value || '').trim();
            if (!code) return;
            const raw = f.margenInput ? String(f.margenInput.value || '').trim() : '';
            if (raw === '') return;
            const m = parseFloat(raw.replace(',', '.'));
            if (!Number.isFinite(m)) return;
            if (m < MARGEN_MIN_CONFIRMA_OV) out.push({ codigo: code, margen: m });
        });
        return out;
    }
    function solicitarAutorizacionMargenBajo(linesText) {
        return new Promise(function (resolve) {
            if (!margenAuthModal || !margenAuthUser || !margenAuthPass || !margenAuthConfirm) {
                resolve(window.confirm('Margen menor al ' + MARGEN_MIN_CONFIRMA_OV + '% en: ' + linesText + '. ¿Confirmas guardar igual?'));
                return;
            }
            margenAuthResolver = resolve;
            if (margenAuthError) {
                margenAuthError.style.display = 'none';
                margenAuthError.textContent = '';
            }
            if (margenAuthIntro) {
                margenAuthIntro.textContent = 'Margen menor al ' + MARGEN_MIN_CONFIRMA_OV + '% en: ' + linesText + '. Ingresa autorización para continuar.';
            }
            if (margenAuthSuccessBox) margenAuthSuccessBox.style.display = 'none';
            margenAuthUser.value = '';
            margenAuthPass.value = '';
            if (margenAuthFormFields) margenAuthFormFields.style.display = '';
            margenAuthUser.disabled = false;
            margenAuthPass.disabled = false;
            if (margenAuthCancel) {
                margenAuthCancel.textContent = 'Cancelar';
                margenAuthCancel.classList.remove('primary');
            }
            if (margenAuthConfirm) margenAuthConfirm.style.display = '';
            margenAuthConfirm.disabled = false;
            margenAuthConfirm.textContent = 'Autorizar y guardar';
            margenAuthModal.classList.add('open');
            window.setTimeout(function () { margenAuthUser.focus(); }, 10);
        });

    function closeMargenAuthModal(result) {
        const resolver = margenAuthResolver;
        margenAuthResolver = null;
        if (margenAuthModal) margenAuthModal.classList.remove('open');
        if (typeof resolver === 'function') resolver(!!result);
    }
    function resolveMargenAuth(result) {
        const resolver = margenAuthResolver;
        margenAuthResolver = null;
        if (typeof resolver === 'function') resolver(!!result);
    }
    function submitMargenAuthorization() {
        if (!margenAuthUser || !margenAuthPass || !margenAuthConfirm) return;
        const usuario = String(margenAuthUser.value || '').trim();
        const password = String(margenAuthPass.value || '');
        if (!usuario || !password) {
            if (margenAuthError) {
                margenAuthError.style.display = 'block';
                margenAuthError.textContent = 'Debes ingresar usuario y clave.';
            }
            return;
        }
        margenAuthConfirm.disabled = true;
        margenAuthConfirm.textContent = 'Validando...';
        fetch(URL_OV_AUTH_MARGEN, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ usuario: usuario, password: password })
        })
            .then(function (response) {
                return response.json().then(function (data) {
                    if (!response.ok || !data.success) {
                        throw new Error((data && data.message) || 'No autorizado para margen bajo');
                    }
                    return data;
                });
            })
            .then(function () {
                /* Mantener modal visible: primero autoriza, luego guarda y muestra estado en el mismo modal. */
                resolveMargenAuth(true);
            })
            .catch(function (error) {
                if (margenAuthError) {
                    margenAuthError.style.display = 'block';
                    margenAuthError.textContent = error.message || 'No se pudo validar autorización';
                }
            })
            .finally(function () {
                if (margenAuthConfirm) {
                    margenAuthConfirm.disabled = false;
                    margenAuthConfirm.textContent = 'Autorizar y guardar';
                }
            });
    }
    function updateRowSub(row) {
        const fields = getRF(row);
        const amt = lineSubtotalAmount(row);
        if (fields.subtotalEl) fields.subtotalEl.textContent = amt.toFixed(2);
        updateTotals();
    }
    function updateTotals() {
        let subtotalBruto = 0;
        itemsBody.querySelectorAll('.item-row').forEach(function (row) {
            subtotalBruto += lineSubtotalAmount(row);
        });
        subtotalBruto = Math.round(subtotalBruto * 100) / 100;
        let pct = 0;
        if (!IS_SUPPLIER_DOC && partyMayorista && partyMargenPct > 0) {
            pct = Math.min(100, partyMargenPct);
        }
        const descMonto = pct ? Math.round(subtotalBruto * (pct / 100) * 100) / 100 : 0;
        const subtotal = Math.round((subtotalBruto - descMonto) * 100) / 100;
        const iva = Math.round(subtotal * 0.19 * 100) / 100;
        const total = Math.round((subtotal + iva) * 100) / 100;
        const showMay = descMonto > 0.004;
        if (tSubtotalBrutoRow) tSubtotalBrutoRow.hidden = !showMay;
        if (tDescuentoMayoristaRow) tDescuentoMayoristaRow.hidden = !showMay;
        if (tSubtotalBruto && showMay) tSubtotalBruto.textContent = fmtCLP(subtotalBruto);
        if (tDescuentoMayorista && showMay) {
            tDescuentoMayorista.textContent = '-' + fmtCLP(descMonto);
        }
        if (tDescuentoMayoristaLbl) {
            tDescuentoMayoristaLbl.textContent = pct > 0
                ? 'Descuento mayorista (' + pct + '%)'
                : 'Descuento mayorista';
        }
        if (tSubtotal) tSubtotal.textContent = fmtCLP(subtotal);
        if (tIva) tIva.textContent = fmtCLP(iva);
        if (tTotal) tTotal.textContent = fmtCLP(total);
    }

    function applyTotalsFromServer(totals) {
        if (!totals) return;
        const desc = Number(totals.descuento);
        const hasDisc = Number.isFinite(desc) && desc > 0.004;
        let bruto = Number(totals.subtotal_bruto);
        if (!Number.isFinite(bruto)) {
            bruto = Number(totals.subtotal || 0) + (Number.isFinite(desc) ? desc : 0);
        }
        if (tSubtotalBrutoRow) tSubtotalBrutoRow.hidden = !hasDisc;
        if (tDescuentoMayoristaRow) tDescuentoMayoristaRow.hidden = !hasDisc;
        if (tSubtotalBruto && hasDisc) {
            tSubtotalBruto.textContent = totals.subtotal_bruto_fmt || fmtCLP(bruto);
        }
        if (tDescuentoMayorista && hasDisc && Number.isFinite(desc)) {
            tDescuentoMayorista.textContent = '-' + fmtCLP(desc);
        }
        if (tDescuentoMayoristaLbl) {
            tDescuentoMayoristaLbl.textContent = partyMayorista && partyMargenPct > 0
                ? 'Descuento mayorista (' + partyMargenPct + '%)'
                : 'Descuento mayorista';
        }
        if (tSubtotal) tSubtotal.textContent = totals.subtotal_fmt || fmtCLP(totals.subtotal || 0);
        if (tIva) tIva.textContent = totals.iva_fmt || fmtCLP(totals.iva || 0);
        if (tTotal) tTotal.textContent = totals.total_fmt || fmtCLP(totals.total || 0);
    }

    function renderChips(row, product, selectedMarca, selectedBodega, selectedOrigen) {
        const fields = getRF(row);
        if (!fields.stockEl) return;
        const entries = Array.isArray(product.stock_entries) ? product.stock_entries : [];
        if (!entries.length) {
            fields.stockEl.innerHTML = '';
            return;
        }
        fields.stockEl.innerHTML = entries.map(function (entry) {
            const stock = parseInt(entry.stock || 0, 10);
            const tone = stock > 0 ? 'ok' : 'zero';
            const active =
                String(entry.marca || '').trim().toUpperCase() === String(selectedMarca || '').trim().toUpperCase() &&
                String(entry.bodega || '').trim() === String(selectedBodega || '').trim() &&
                String(entry.origen_compra || '').trim().toLowerCase() === String(selectedOrigen || '').trim().toLowerCase();
            const originLabel = String(entry.origen_compra || 'nacional').trim().toLowerCase() === 'importacion'
                ? 'Importación'
                : 'Nacional';
            return '<span class="sc-chip ' + tone + (active ? ' act' : '') + '">' + esc(entry.marca || 'Default') + ' · ' + esc(originLabel) + ' · ' + stock + '</span>';
        }).join(' ');
    }
    function fillSelect(select, options, selectedValue) {
        select.innerHTML = '';
        options.forEach(function (item) {
            const option = document.createElement('option');
            option.value = item.value;
            option.textContent = item.label;
            if (String(item.value) === String(selectedValue)) option.selected = true;
            select.appendChild(option);
        });
        if (!select.value && options.length) select.value = options[0].value;
    }
    function populateVariants(row, product, preferredMarca, preferredBodega, preferredOrigen) {
        const fields = getRF(row);
        if (!fields.marcaSel || !fields.bodegaSel || !fields.origenSel) return;
        const entries = Array.isArray(product.stock_entries) ? product.stock_entries : [];
        const preferredBrand = String(preferredMarca || fields.marcaSel.value || product.default_marca || '').trim().toUpperCase();
        const preferredWarehouse = String(preferredBodega || fields.bodegaSel.value || product.default_bodega || 'Bodega 1').trim();
        const preferredOrigin = String(preferredOrigen || fields.origenSel.value || product.default_origen_compra || 'nacional').trim().toLowerCase();

        if (!entries.length) {
            fillSelect(fields.marcaSel, [{ value: '', label: 'Sin variante' }], '');
            fillSelect(fields.bodegaSel, [{ value: 'Bodega 1', label: 'Bodega 1' }], 'Bodega 1');
            fillSelect(fields.origenSel, [{ value: 'nacional', label: 'Nacional' }], 'nacional');
            renderChips(row, product, '', 'Bodega 1', 'nacional');
            return;
        }

        const brandMap = {};
        entries.forEach(function (entry) {
            const key = String(entry.marca || '').trim().toUpperCase();
            brandMap[key] = (brandMap[key] || 0) + parseInt(entry.stock || 0, 10);
        });
        const brandOptions = Object.keys(brandMap).map(function (key) {
            return { value: key, label: (key || 'Sin variante') + ' (' + brandMap[key] + ')' };
        });
        fillSelect(fields.marcaSel, brandOptions, preferredBrand);

        function syncWarehouse() {
            const currentBrand = String(fields.marcaSel.value || '').trim().toUpperCase();
            const warehouses = entries.filter(function (entry) {
                return String(entry.marca || '').trim().toUpperCase() === currentBrand;
            });
            const warehouseOptions = (warehouses.length ? warehouses : entries).map(function (entry) {
                const warehouse = String(entry.bodega || 'Bodega 1').trim() || 'Bodega 1';
                return {
                    value: warehouse,
                    label: warehouse + ' (' + parseInt(entry.stock || 0, 10) + ')'
                };
            });
            const value = warehouseOptions.some(function (option) { return option.value === preferredWarehouse })
                ? preferredWarehouse
                : warehouseOptions[0].value;
            fillSelect(fields.bodegaSel, warehouseOptions, value);
            syncOrigin();
        }

        function syncOrigin() {
            const currentBrand = String(fields.marcaSel.value || '').trim().toUpperCase();
            const currentWarehouse = String(fields.bodegaSel.value || '').trim() || 'Bodega 1';
            const originRows = entries.filter(function (entry) {
                return String(entry.marca || '').trim().toUpperCase() === currentBrand &&
                    String(entry.bodega || '').trim() === currentWarehouse;
            });
            const uniqueOrigins = [];
            originRows.forEach(function (entry) {
                const raw = String(entry.origen_compra || 'nacional').trim().toLowerCase();
                if (uniqueOrigins.indexOf(raw) === -1) uniqueOrigins.push(raw);
            });
            let originOptions = uniqueOrigins.map(function (raw) {
                return {
                    value: raw,
                    label: raw === 'importacion' ? 'Importación' : 'Nacional'
                };
            });
            if (!originOptions.length) {
                originOptions = [{ value: 'nacional', label: 'Nacional' }];
            }
            const requiresExplicit = originOptions.length > 1;
            if (requiresExplicit) {
                originOptions.unshift({ value: '', label: 'Seleccionar origen' });
            }
            const selectedOrigin = originOptions.some(function (opt) { return opt.value === preferredOrigin; })
                ? preferredOrigin
                : (requiresExplicit ? '' : originOptions[0].value);
            fillSelect(fields.origenSel, originOptions, selectedOrigin);
            fields.origenSel.required = true;
            renderChips(row, product, currentBrand, currentWarehouse, fields.origenSel.value);
        }

        fields.marcaSel.onchange = function () {
            syncWarehouse();
            fetchIngresoRefForRow(row, {}).then(function () { updateRowSub(row); });
        };
        fields.bodegaSel.onchange = function () {
            syncOrigin();
            fetchIngresoRefForRow(row, {}).then(function () { updateRowSub(row); });
        };
        fields.origenSel.onchange = function () {
            renderChips(row, product, fields.marcaSel.value, fields.bodegaSel.value, fields.origenSel.value);
            fetchIngresoRefForRow(row, {}).then(function () { updateRowSub(row); });
        };
        syncWarehouse();
    }
    function applyProduct(row, product, options) {
        const fields = getRF(row);
        const opts = options || {};
        row._pd = product;
        if (fields.codeInput) fields.codeInput.value = product.codigo || '';
        if (fields.descInput && (!fields.descInput.value.trim() || opts.forceDesc)) fields.descInput.value = product.descripcion || '';
        if (fields.priceInput && (!fields.priceInput.value || parseNum(fields.priceInput.value) <= 0 || opts.forcePrice)) {
            fields.priceInput.value = Number(product.precio || 0).toFixed(2);
        }
        if (fields.metaInput) {
            const parts = [];
            if (product.oem) parts.push('OEM: ' + product.oem);
            if (product.modelo) parts.push(product.modelo);
            const built = parts.join(' · ');
            if (opts.forceModeloLine || !String(fields.metaInput.value || '').trim()) {
                fields.metaInput.value = built;
            }
        }
        populateVariants(row, product, opts.marca, opts.bodega, opts.origen_compra);
        const ingOpts = opts.skipIngresoPrecio ? { skipPrecioMargen: true } : {};
        fetchIngresoRefForRow(row, ingOpts).then(function () { updateRowSub(row); });
        updateRowSub(row);
    }
    function clearRow(row) {
        const fields = getRF(row);
        row._pd = null;
        if (fields.metaInput) fields.metaInput.value = '';
        if (fields.stockEl) fields.stockEl.innerHTML = '';
        if (fields.marcaSel) fields.marcaSel.innerHTML = '<option value="">Sin variante</option>';
        if (fields.bodegaSel) fields.bodegaSel.innerHTML = '<option value="Bodega 1">Bodega 1</option>';
        if (fields.origenSel) fields.origenSel.innerHTML = '<option value="nacional">Nacional</option>';
        applyIngresoRefToRow(row, null, {});
    }
    function fetchProduct(code) {
        return fetch(URL_PRODUCTO + '?codigo=' + encodeURIComponent(code), {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(function (response) { return response.json(); })
            .then(function (data) {
                if (!data.success || !data.producto) throw new Error(data.message || 'No encontrado');
                return data.producto;
            });
    }
    function lookupCode(row, options) {
        const fields = getRF(row);
        const code = String(fields.codeInput ? fields.codeInput.value : '').trim().toUpperCase();
        const opts = options || {};
        if (!code) {
            clearRow(row);
            return Promise.resolve(null);
        }
        fields.codeInput.value = code;
        return fetchProduct(code)
            .then(function (product) {
                applyProduct(row, product, opts);
                if (opts.focusNext) {
                    if (product.has_variantes) fields.marcaSel.focus();
                    else if (fields.qtyInput) { fields.qtyInput.focus(); fields.qtyInput.select(); }
                }
                return product;
            })
            .catch(function (error) {
                if (!opts.silent) {
                    clearRow(row);
                    if (fields.metaInput) fields.metaInput.value = error.message;
                }
                return null;
            });
    }
    function findExisting(data) {
        const key = itemKey(data);
        return Array.from(itemsBody.querySelectorAll('.item-row')).find(function (row) {
            const fields = getRF(row);
            return key === itemKey({
                codigo: fields.codeInput ? fields.codeInput.value : '',
                marca: fields.marcaSel ? fields.marcaSel.value : '',
                bodega: fields.bodegaSel ? fields.bodegaSel.value : '',
                origen_compra: fields.origenSel ? fields.origenSel.value : ''
            });
        }) || null;
    }
    function findEmpty() {
        return Array.from(itemsBody.querySelectorAll('.item-row')).find(function (row) {
            const fields = getRF(row);
            return !String(fields.codeInput ? fields.codeInput.value : '').trim();
        }) || null;
    }
    function mergeOrInsert(item) {
        let row = findExisting(item);
        if (row) {
            const fields = getRF(row);
            const qty = Math.max(1, parseInt(fields.qtyInput.value || '1', 10) || 1);
            fields.qtyInput.value = String(qty + Math.max(1, parseInt(item.cantidad || 1, 10) || 1));
            updateRowSub(row);
            return row;
        }
        row = findEmpty() || addRow();
        applyProduct(row, item, { marca: item.marca, bodega: item.bodega, origen_compra: item.origen_compra, forceDesc: true, forcePrice: true, forceModeloLine: true });
        const fields = getRF(row);
        if (fields.qtyInput) fields.qtyInput.value = String(Math.max(1, parseInt(item.cantidad || 1, 10) || 1));
        if (fields.priceInput) fields.priceInput.value = Number(item.precio || 0).toFixed(2);
        updateRowSub(row);
        return row;
    }
    function wireRow(row) {
        const fields = getRF(row);
        row.querySelectorAll('.item-qty, .item-price').forEach(function (input) {
            input.addEventListener('input', function () { updateRowSub(row); });
        });
        if (fields.margenInput) {
            fields.margenInput.addEventListener('input', function () { onMargenOrCostoSubtotal(row); });
            fields.margenInput.addEventListener('change', function () { onMargenOrCostoSubtotal(row); });
        }

        const removeBtn = row.querySelector('.remove-row-btn');
        if (removeBtn) {
            removeBtn.addEventListener('click', function () {
                const rows = itemsBody.querySelectorAll('.item-row');
                if (rows.length <= 1) {
                    row.querySelectorAll('input').forEach(function (input) { input.value = ''; });
                    if (fields.marcaSel) fields.marcaSel.innerHTML = '<option value="">Sin variante</option>';
                    if (fields.bodegaSel) fields.bodegaSel.innerHTML = '<option value="Bodega 1">Bodega 1</option>';
                    if (fields.qtyInput) fields.qtyInput.value = '1';
                    if (fields.priceInput) fields.priceInput.value = '0';
                    clearRow(row);
                    updateRowSub(row);
                    return;
                }
                row.remove();
                renumberRows();
                updateTotals();
            });
        }

        if (fields.codeInput) {
            let rowTimer = null;
            fields.codeInput.addEventListener('blur', function () {
                lookupCode(row, { silent: true });
            });
            fields.codeInput.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    lookupCode(row, { focusNext: true });
                }
                if (event.key === 'F2') {
                    event.preventDefault();
                    openPSModal(row, fields.codeInput.value);
                }
            });
            fields.codeInput.addEventListener('input', function () {
                if (rowTimer) clearTimeout(rowTimer);
                const code = String(fields.codeInput.value || '').trim();
                if (code.length < 3) {
                    clearRow(row);
                    return;
                }
                rowTimer = setTimeout(function () {
                    lookupCode(row, { silent: true });
                }, 280);
            });
        }

        if (fields.srchBtn) {
            fields.srchBtn.addEventListener('click', function () {
                openPSModal(row, fields.codeInput ? fields.codeInput.value : '');
            });
        }

        if (fields.histBtn && fields.codeInput) {
            function refreshHistState() {
                const c = String(fields.codeInput.value || '').trim();
                if (c) {
                    fields.histBtn.disabled = false;
                    fields.histBtn.classList.remove('is-disabled');
                } else {
                    fields.histBtn.disabled = true;
                    fields.histBtn.classList.add('is-disabled');
                }
            }
            fields.histBtn.addEventListener('click', function (ev) {
                ev.preventDefault();
                const c = String(fields.codeInput.value || '').trim();
                if (!c) return;
                if (typeof window.openProductoTraceability === 'function') {
                    window.openProductoTraceability(c, c);
                }
            });
            fields.codeInput.addEventListener('input', refreshHistState);
            fields.codeInput.addEventListener('blur', refreshHistState);
            refreshHistState();
        }

        wireCostToggle(row);
        updateRowSub(row);
        const code = String(fields.codeInput ? fields.codeInput.value : '').trim();
        if (code) lookupCode(row, { silent: true });
    }
    function addRow() {
        const index = itemsBody.querySelectorAll('.item-row').length + 1;
        const row = document.createElement('tr');
        row.className = 'item-row';
        row.innerHTML =
            '<td class="tc-num"><span class="row-num">' + index + '</span></td>' +
            '<td class="tc-code"><div class="code-wrap">' +
                '<button type="button" class="code-hist-btn no-print" title="Ver movimientos del código (historial)">&#8594;</button>' +
                '<input name="item_codigo[]" class="item-codigo" autocomplete="off" placeholder="Código">' +
                '<button class="code-srch-btn no-print" type="button" title="Buscar (F2)">&#128269;</button>' +
            '</div></td>' +
            '<td class="tc-desc"><div class="tc-desc-stack">' +
            '<input name="item_descripcion[]" class="item-desc" placeholder="Descripción del producto" autocomplete="off" title="Podés editar la descripción libremente">' +
            '<input name="item_modelo_linea[]" class="item-modelo-input" type="text" placeholder="Modelo / OEM (opcional)" autocomplete="off" title="Modelo o referencia — editable" aria-label="Modelo o referencia">' +
            '<div class="item-stock-row"></div></div></td>' +
            '<td class="tc-brand"><select name="item_marca[]" class="item-marca"><option value="">Sin variante</option></select></td>' +
            '<td class="tc-wh"><select name="item_bodega[]" class="item-bodega"><option value="Bodega 1">Bodega 1</option></select></td>' +
            '<td class="tc-origin"><select name="item_origen_compra[]" class="item-origen-compra"><option value="nacional">Nacional</option><option value="importacion">Importación</option></select></td>' +
            '<td class="tc-qty"><input name="item_cantidad[]" class="item-qty" type="number" min="1" value="1"></td>' +
            '<td class="tc-price"><div class="price-cell-wrap"><div class="price-row-flex">' +
                '<button type="button" class="item-costo-toggle no-print" hidden title="Ver costo neto del último ingreso" aria-expanded="false" aria-label="Mostrar u ocultar costo de ingreso">&#9654;</button>' +
                '<input name="item_precio[]" class="item-price" type="number" min="0" step="0.01" value="0">' +
            '</div><div class="item-costo-banner no-print" hidden>Costo ingreso (neto u.): <strong class="item-costo-val">—</strong></div></div></td>' +
            '<td class="tc-marg"><input name="item_margen[]" class="item-margen" type="number" min="0" max="999" step="0.01" placeholder="%" title="Margen % sobre P. unitario neto. Si es menor a 30%, al guardar OV se pedirá confirmación." aria-label="Margen porcentaje"></td>' +
            '<td class="tc-sub"><span class="item-subtotal">0.00</span></td>' +
            '<td class="tc-rm no-print"><button class="remove-row-btn" type="button" title="Quitar fila">&#10005;</button></td>';
        itemsBody.appendChild(row);
        wireRow(row);
        return row;
    }

    function clearItemRows() {
        if (!itemsBody) return;
        itemsBody.innerHTML = '';
    }

    function setRowsFromDocument(items) {
        clearItemRows();
        const safeItems = Array.isArray(items) && items.length ? items : [{
            codigo: '',
            descripcion: '',
            marca: '',
            bodega: 'Bodega 1',
            origen_compra: 'nacional',
            cantidad: 1,
            precio: 0,
            margen: null,
            modelo_linea: '',
        }];
        safeItems.forEach(function (item) {
            const row = addRow();
            const fields = getRF(row);
            if (fields.codeInput) fields.codeInput.value = item.codigo || '';
            if (fields.descInput) fields.descInput.value = item.descripcion || '';
            if (fields.qtyInput) fields.qtyInput.value = String(Math.max(1, parseInt(item.cantidad || 1, 10) || 1));
            if (fields.priceInput) fields.priceInput.value = Number(item.precio || 0).toFixed(2);
            if (fields.margenInput) {
                fields.margenInput.value = (item.margen != null && item.margen !== '') ? String(item.margen) : '';
            }
            if (fields.metaInput) {
                fields.metaInput.value = item.modelo_linea != null ? String(item.modelo_linea) : '';
            }
            lookupCode(row, {
                silent: true,
                marca: item.marca || '',
                bodega: item.bodega || 'Bodega 1',
                origen_compra: item.origen_compra || 'nacional',
                forceDesc: true,
                forcePrice: false,
                skipIngresoPrecio: true,
            }).then(function () {
                const refreshed = getRF(row);
                if (refreshed.marcaSel && item.marca) refreshed.marcaSel.value = item.marca;
                if (refreshed.bodegaSel && item.bodega) refreshed.bodegaSel.value = item.bodega;
                if (refreshed.origenSel && item.origen_compra) refreshed.origenSel.value = item.origen_compra;
                if (refreshed.metaInput && item.modelo_linea != null && String(item.modelo_linea).trim() !== '') {
                    refreshed.metaInput.value = String(item.modelo_linea);
                }
                updateRowSub(row);
            });
        });
        renumberRows();
        updateTotals();
    }

    function currentDocApiUrl(numero) {
        const key = String(DOC_TYPE || '').trim().toLowerCase();
        const encoded = encodeURIComponent(String(numero || '').trim());
        if (key === 'cotizacion') return '/ventas/api/cotizacion/' + encoded;
        if (key === 'orden_venta') return '/ventas/api/orden_venta/' + encoded;
        if (key === 'factura') return '/ventas/api/factura/' + encoded;
        return '/ventas/api/orden_compra/' + encoded;
    }

    function hydrateFromDocument(doc) {
        if (!doc) return;
        if (loadedDocumentIdInput) loadedDocumentIdInput.value = String(doc.id || 0);
        if (docNumberInput) docNumberInput.value = doc.numero || '';
        if (docDateInput) docDateInput.value = doc.fecha_documento || '';
        if (docValidInput) docValidInput.value = doc.fecha_vencimiento || '';
        if (statusInput && doc.status) statusInput.value = doc.status;
        if (tipoDocumento && doc.tipo_documento) tipoDocumento.value = doc.tipo_documento;
        if (notesInput) notesInput.value = doc.notes || '';

        const p = doc.party || {};
        hiddenPartyId.value = String(p.id || 0);
        if (hiddenProveedorId && !{{ is_supplier_doc|tojson }}) {
            hiddenProveedorId.value = String(p.proveedor_id || 0);
        }
        partyName.value = p.name || '';
        partyAddress.value = p.address || '';
        partyTelefono.value = p.telefono || '';
        partyEmail.value = p.email || '';
        partyRutHidden.value = p.rut || '';
        if (rutLookup) rutLookup.value = p.rut || '';
        setPartyStatus(PARTY_LABEL + ' cargado: ' + (p.name || ''), 'found');
        setPartyManualFieldsVisible(false);

        if (!IS_SUPPLIER_DOC) {
            partyMayorista = !!p.cliente_mayorista;
            partyMargenPct = parseFloat(p.margen_descuento_pct) || 0;
        } else {
            partyMayorista = false;
            partyMargenPct = 0;
        }

        setRowsFromDocument(doc.items || []);
        applyTotalsFromServer(doc.totals);
        updateConversionLocks(doc);
        // Carga por API no dispara eventos input/change: actualizar paneles de inmediato.
        refreshProgressiveActionPanels();
    }

    function updateConversionLocks(doc) {
        if (!doc) return;
        var dt = String(DOC_TYPE || '').trim().toLowerCase();
        if (btnConvertToOV) {
            btnConvertToOV.disabled = false;
            btnConvertToOV.removeAttribute('title');
            if (dt === 'cotizacion' && doc.puede_convertir_a_orden_venta === false) {
                btnConvertToOV.disabled = true;
                btnConvertToOV.title = 'Ya hay ' + (doc.documento_hijo_tipo || '') + ' ' + (doc.documento_hijo_resumen || '') + ' cobrado en caja en esta cadena.';
            }
        }
        if (btnFacturarOV) {
            btnFacturarOV.disabled = false;
            btnFacturarOV.removeAttribute('title');
            if (dt === 'orden_venta' && doc.puede_convertir_a_factura_boleta === false) {
                btnFacturarOV.disabled = true;
                if (doc.picking_bloquea_facturacion) {
                    btnFacturarOV.title = 'Bodega debe marcar el picking como entregado al vendedor antes de facturar o boletear.';
                } else {
                    btnFacturarOV.title = 'Ya existe ' + (doc.documento_hijo_tipo || '') + ' ' + (doc.documento_hijo_resumen || '') + ' cobrado en caja.';
                }
            }
        }
        if (btnBoletearOV) {
            btnBoletearOV.disabled = false;
            btnBoletearOV.removeAttribute('title');
            if (dt === 'orden_venta' && doc.puede_convertir_a_factura_boleta === false) {
                btnBoletearOV.disabled = true;
                btnBoletearOV.title = (btnFacturarOV && btnFacturarOV.title) ? btnFacturarOV.title : '';
            }
        }
    }

    function loadDocument(numero) {
        const cleanNumber = String(numero || '').trim();
        if (!cleanNumber) return;
        fetch(currentDocApiUrl(cleanNumber), {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(function (response) {
                return response.json().then(function (data) {
                    if (!response.ok || !data.success || !data.documento) {
                        throw new Error((data && data.message) || 'Documento no encontrado');
                    }
                    return data.documento;
                });
            })
            .then(function (doc) {
                hydrateFromDocument(doc);
                refreshProgressiveActionPanels();
            })
            .catch(function (err) {
                notifyUi((err && err.message) ? err.message : 'Documento no encontrado', 'error', 'Documento');
            });
    }

    function updateSelCount() {
        if (psSelCount) psSelCount.textContent = psSelected.size + ' seleccionado(s)';
    }
    function closePSModal() {
        psModal.classList.remove('open');
        psSelected.clear();
        updateSelCount();
    }
    function renderPSRows(items) {
        if (!psResults) return;
        if (!items.length) {
            psResults.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#94a3b8;">Sin resultados.</td></tr>';
            return;
        }
        psResults.innerHTML = items.map(function (item) {
            const stock = parseInt(item.variant_stock || 0, 10);
            const tone = stock > 0 ? 'ok' : 'zero';
            const key = itemKey(item);
            const originLabel = String(item.origen_compra || 'nacional').toLowerCase() === 'importacion' ? 'Importación' : 'Nacional';
            const checked = psSelected.has(key) ? 'checked' : '';
            const selected = psSelected.has(key) ? 'sel' : '';
            return '<tr class="' + selected + '" data-key="' + esc(key) + '">' +
                '<td style="text-align:center;"><input type="checkbox" class="ps-chk" data-key="' + esc(key) + '" ' + checked + '></td>' +
                '<td><div class="ps-spill"><strong>' + esc(item.codigo) + '</strong><small>' + esc(item.oem || '') + '</small></div></td>' +
                '<td><div class="ps-spill"><strong>' + esc(item.descripcion || '—') + '</strong><small>' + esc(item.modelo || '') + '</small></div></td>' +
                '<td>' + esc(item.marca || '—') + '<small>' + esc(originLabel) + '</small></td>' +
                '<td>' + esc(item.bodega || 'Bodega 1') + '</td>' +
                '<td><span class="ps-stk ' + tone + '">' + stock + ' disp.</span></td>' +
                '<td style="text-align:right;">$' + Math.round(Number(item.precio || 0)).toLocaleString('es-CL') + '</td>' +
                '</tr>';
        }).join('');

        psResults.querySelectorAll('.ps-chk').forEach(function (checkbox) {
            checkbox.addEventListener('change', function () {
                const key = checkbox.dataset.key;
                const data = items.find(function (item) { return itemKey(item) === key; });
                if (!data) return;
                if (checkbox.checked) psSelected.set(key, data);
                else psSelected.delete(key);
                updateSelCount();
                renderPSRows(items);
            });
        });

        psResults.querySelectorAll('tr[data-key]').forEach(function (row) {
            row.addEventListener('dblclick', function () {
                const key = row.dataset.key;
                const data = items.find(function (item) { return itemKey(item) === key; });
                if (!data) return;
                psSelected.clear();
                psSelected.set(key, data);
                applySelected();
            });
        });
    }
    function runPSSearch(term) {
        const query = String(term || '').trim();
        if (!psSummary) return;
        if (query.length < 2) {
            psSummary.textContent = 'Escribe al menos 2 caracteres.';
            if (psResults) psResults.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#94a3b8;">Sin búsqueda ejecutada.</td></tr>';
            return;
        }
        psSummary.textContent = 'Buscando…';
        fetch(URL_PRODUCT_SEARCH + '?q=' + encodeURIComponent(query) + '&limit=80', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(function (response) { return response.json(); })
            .then(function (data) {
                const items = (data && data.success && Array.isArray(data.items)) ? data.items : [];
                psSummary.textContent = items.length + ' resultado(s) para "' + query + '"';
                renderPSRows(items);
            })
            .catch(function (error) {
                psSummary.textContent = 'Error: ' + error.message;
            });
    }
    function openPSModal(row, preset) {
        if (!psModal) return;
        activeSearchRow = row || null;
        psSelected.clear();
        updateSelCount();
        psModal.classList.add('open');
        if (psInput) {
            psInput.value = String(preset || '').trim();
            psInput.focus();
        }
        runPSSearch(psInput ? psInput.value : preset);
    }
    function applySelected() {
        const items = Array.from(psSelected.values());
        if (!items.length) return;
        items.forEach(function (item, index) {
            const target = index === 0 && activeSearchRow ? activeSearchRow : null;
            if (target) {
                applyProduct(target, item, { marca: item.marca, bodega: item.bodega, origen_compra: item.origen_compra, forceDesc: true, forcePrice: true, forceModeloLine: true });
                const fields = getRF(target);
                if (fields.qtyInput && !parseInt(fields.qtyInput.value || '0', 10)) fields.qtyInput.value = '1';
                updateRowSub(target);
            } else {
                mergeOrInsert(Object.assign({}, item, { cantidad: 1 }));
            }
        });
        closePSModal();
    }

    if (btnConvertToOV) {

            const numero = currentDocumentNumber();

                notifyUi('Carga una cotización guardada para convertir.', 'error', 'Documento requerido');
                return;

            postJson(endpointWithNumber(URL_CONV_CO_OV, numero), {})
                .then(function (data) {
                    if (data.redirect_url) {
                        if (window._loadModule) {
                            window._loadModule(data.redirect_url);
                        } else {
                            window.location.href = data.redirect_url;
                        }
                        return;
                    }
                    notifyUi('Convertida a Orden de Venta: ' + ((data.documento && data.documento.numero) || ''), 'success', 'Conversión exitosa');
                })
                .catch(function (error) { notifyUi(error.message, 'error', 'No se pudo convertir'); });
        });
    }

            postJson(endpointWithNumber(URL_CONV_OV_FA, numero), { tipo_documento: 'factura' })

                    notifyUi('Factura creada: ' + ((data.documento && data.documento.numero) || ''), 'success', 'Conversión exitosa');

        });

    if (btnBoletearOV) {
        btnBoletearOV.addEventListener('click', function () {
            const numero = currentDocumentNumber();
            if (!numero) {
                notifyUi('Carga una orden de venta guardada para emitir boleta.', 'error', 'Documento requerido');
                return;
            }
            postJson(endpointWithNumber(URL_CONV_OV_FA, numero), { tipo_documento: 'boleta' })
                .then(function (data) {
                    if (data.redirect_url) {
                        if (window._loadModule) {
                            window._loadModule(data.redirect_url);
                        } else {
                            window.location.href = data.redirect_url;
                        }
                        return;
                    }
                    notifyUi('Boleta creada: ' + ((data.documento && data.documento.numero) || ''), 'success', 'Conversión exitosa');
                })
                .catch(function (error) { notifyUi(error.message, 'error', 'No se pudo convertir'); });
        });
    }

    if (btnPickingBodega) {
        btnPickingBodega.addEventListener('click', function () {
            const numero = currentDocumentNumber();
            if (!numero) {
                notifyUi('Cargue o guarde la orden de venta antes de enviar picking a bodega.', 'error', 'Documento requerido');
                return;
            }
            postJson(endpointWithNumber(URL_OV_PICKING, numero), {})
                .then(function (data) {
                    const url = (data && data.redirect_url) || '';
                    if (url) {
                        if (window._loadModule) {
                            window._loadModule(url);
                        } else {
                            window.location.href = url;
                        }
                        return;
                    }
                    notifyUi((data && data.message) || 'Listo.', 'success', 'Operación completada');
                })
                .catch(function (error) { notifyUi(error.message, 'error', 'No se pudo completar'); });
        });
    }

    if (btnRecibirOC) {
        btnRecibirOC.addEventListener('click', function () {
            const id = currentDocumentId();
            if (!id) {
                notifyUi('Carga una orden de compra guardada para recibir.', 'error', 'Documento requerido');
                return;
            }
            postJson(endpointWithId(URL_CONV_OC_ING, id), {})
                .then(function (data) {
                    notifyUi('Ingreso registrado: ' + ((data.documento && data.documento.numero) || ''), 'success', 'Recepción completada');
                })
                .catch(function (error) { notifyUi(error.message, 'error', 'No se pudo recibir'); });
        });
    }

    if (btnCreateNC) {
        btnCreateNC.addEventListener('click', function () {
            const id = currentDocumentId();
            if (!id) {
                notifyUi('Carga una factura guardada para crear nota de crédito.', 'error', 'Documento requerido');
                return;
            }
            const razonRaw = window.prompt('Razón de la nota de crédito:', 'Devolución total');
            if (razonRaw === null) {
                return;
            }
            const razon = (razonRaw || '').trim() || 'Devolución total';
            const devolverDinero = window.confirm(
                '¿Cómo se liquida el monto frente al cliente?\n\n' +
                'Aceptar = devolución de dinero (reembolso)\n' +
                'Cancelar = saldo a favor (crédito para futuras compras)'
            );
            const modo_liquidacion = devolverDinero ? 'devolucion_dinero' : 'saldo_favor';
            postJson(endpointWithId(URL_CONV_FA_NC, id), { razon: razon, modo_liquidacion: modo_liquidacion })
                .then(function (data) {
                    const nc = data.nota_credito || {};
                    notifyUi('Nota de crédito creada: ' + (nc.numero || ''), 'success', 'Conversión exitosa');
                })
                .catch(function (error) { notifyUi(error.message, 'error', 'No se pudo convertir'); });
        });
    }

    if (btnTraceDoc) btnTraceDoc.addEventListener('click', openTrace);
    if (traceClose) traceClose.addEventListener('click', closeTrace);
    if (traceClose2) traceClose2.addEventListener('click', closeTrace);
    if (traceModal) {
        traceModal.addEventListener('click', function (event) {
            if (event.target === traceModal) closeTrace();
        });
    }
    if (margenAuthClose) margenAuthClose.addEventListener('click', function () { closeMargenAuthModal(false); });
    if (margenAuthCancel) margenAuthCancel.addEventListener('click', function () { closeMargenAuthModal(false); });
    if (margenAuthConfirm) margenAuthConfirm.addEventListener('click', submitMargenAuthorization);
    if (margenAuthModal) {
        margenAuthModal.addEventListener('click', function (event) {
            if (event.target === margenAuthModal) closeMargenAuthModal(false);
        });
    }
    if (margenAuthPass) {
        margenAuthPass.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                submitMargenAuthorization();
            }
        });
    }
    if (margenAuthUser) {
        margenAuthUser.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (margenAuthPass) margenAuthPass.focus();
            }
        });
    }
    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && margenAuthModal && margenAuthModal.classList.contains('open')) {
            closeMargenAuthModal(false);
        }
    });

    if (itemsBody) itemsBody.querySelectorAll('.item-row').forEach(wireRow);
    if (addRowBtn) {
        addRowBtn.addEventListener('click', function () {
            const row = addRow();
            const fields = getRF(row);
            if (fields.codeInput) fields.codeInput.focus();
            setTimeout(refreshProgressiveActionPanels, 0);
        });
    }
    if (form) {
        form.addEventListener('input', refreshProgressiveActionPanels);
        form.addEventListener('change', refreshProgressiveActionPanels);
    }
    if (itemsBody) {
        itemsBody.addEventListener('input', refreshProgressiveActionPanels);
        itemsBody.addEventListener('change', refreshProgressiveActionPanels);
    }
    refreshProgressiveActionPanels();
    updateTotals();
    syncPartyPrintFromForm();
    syncPrintMetaFields();
    window.addEventListener('beforeprint', function () {
        syncPartyPrintFromForm();
        syncPrintMetaFields();
    });
    if (docNumberInput) docNumberInput.addEventListener('input', syncPrintMetaFields);
    if (docDateInput) docDateInput.addEventListener('change', syncPrintMetaFields);
    if (docValidInput) docValidInput.addEventListener('change', syncPrintMetaFields);
    if (tipoDocumento) tipoDocumento.addEventListener('change', syncPrintMetaFields);
    if (partyName) partyName.addEventListener('input', function () { syncPartyPrintFromForm(); });
    if (partyAddress) partyAddress.addEventListener('input', function () { syncPartyPrintFromForm(); });
    if (partyTelefono) partyTelefono.addEventListener('input', function () { syncPartyPrintFromForm(); });
    if (partyEmail) partyEmail.addEventListener('input', function () { syncPartyPrintFromForm(); });
    if (rutLookup) rutLookup.addEventListener('change', function () { syncPartyPrintFromForm(); });

    (function applyInitialConversionLocks() {
        var el = document.getElementById('erp-doc-conversion');
        if (!el || !el.textContent) return;
        try {
            updateConversionLocks(JSON.parse(el.textContent));
        } catch (e) { /* ignore */ }
    })();

    if (psRun) psRun.addEventListener('click', function () { runPSSearch(psInput ? psInput.value : ''); });
    if (psClear) psClear.addEventListener('click', function () { if (psInput) psInput.value = ''; runPSSearch(''); });
    if (psClose) psClose.addEventListener('click', closePSModal);
    if (psClose2) psClose2.addEventListener('click', closePSModal);
    if (psApply) psApply.addEventListener('click', applySelected);
    if (psModal) psModal.addEventListener('click', function (event) { if (event.target === psModal) closePSModal(); });

    var productHistoryClose = document.getElementById('productHistoryClose');
    var traceabilityModalEl = document.getElementById('traceabilityModal');
    if (productHistoryClose) {
        productHistoryClose.addEventListener('click', function () {
            if (typeof window.closeProductoTraceability === 'function') window.closeProductoTraceability();
        });
    }
    if (traceabilityModalEl) {
        traceabilityModalEl.addEventListener('click', function (event) {
            if (event.target === traceabilityModalEl && typeof window.closeProductoTraceability === 'function') {
                window.closeProductoTraceability();
            }
        });
    }
    if (psInput) {
        psInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                runPSSearch(psInput.value);
            }
        });
        psInput.addEventListener('input', function () {
            if (searchTimer) clearTimeout(searchTimer);
            searchTimer = setTimeout(function () { runPSSearch(psInput.value); }, 220);
        });
    }

    function showInlineToast(message) {
        notifyUi(message || 'Operación completada', 'success', 'Guardado');
    }

    function setFormSaveBusy(busy) {
        if (!form) return;
        var btn = form.querySelector('.cot-actions button[type="submit"]');
        if (!btn) return;
        if (busy) {
            if (!btn.dataset.saveLabel) btn.dataset.saveLabel = btn.textContent || 'Guardar';
            btn.disabled = true;
            btn.textContent = 'Guardando…';
        } else {
            btn.disabled = false;
            btn.textContent = btn.dataset.saveLabel || btn.textContent || 'Guardar';
        }
    }

    if (form) {
        form.addEventListener('submit', function (event) {
            var ajaxDocTypes = ['cotizacion', 'orden_venta', 'orden_compra', 'factura'];
            var isAjaxDocType = ajaxDocTypes.indexOf(DOC_TYPE) !== -1;
            if (isAjaxDocType) event.preventDefault();

            if (!itemsBody) {
                notifyUi('No se pudo leer las líneas del documento. Recarga la página.', 'error', 'Error al guardar');
                return;
            }

            const partyId = parseInt(hiddenPartyId ? hiddenPartyId.value : '0', 10) || 0;
            const provId = hiddenProveedorId ? (parseInt(hiddenProveedorId.value, 10) || 0) : 0;
            const needsParty = DOC_TYPE === 'cotizacion' || DOC_TYPE === 'orden_venta' || DOC_TYPE === 'factura' || DOC_TYPE === 'orden_compra';
            if (needsParty && !partyId && !provId) {
                event.preventDefault();
                window.alert('Debes buscar o crear un ' + PARTY_KIND + ' antes de guardar el documento.');
                if (rutLookup) rutLookup.focus();
                return;
            }
            var rowMissingOrigin = null;
            itemsBody.querySelectorAll('.item-row').forEach(function (row) {
                if (rowMissingOrigin) return;
                var f = getRF(row);
                var code = String((f.codeInput && f.codeInput.value) || '').trim();
                if (!code || !f.origenSel) return;
                if (!String(f.origenSel.value || '').trim()) rowMissingOrigin = row;
            });
            if (rowMissingOrigin) {
                event.preventDefault();
                window.alert('Debes seleccionar el origen de compra en todas las líneas con producto.');
                var mf = getRF(rowMissingOrigin);
                if (mf.origenSel) mf.origenSel.focus();
                return;
            }
            itemsBody.querySelectorAll('.item-row').forEach(updateRowSub);

            if (String(DOC_TYPE || '').toLowerCase() === 'orden_venta') {
                const bajos = collectMargenBajoOV();
                if (bajos.length) {
                    const lines = bajos.map(function (x) {
                        return x.codigo + ' (' + (Math.round(x.margen * 100) / 100) + '%)';
                    }).join(', ');
                    solicitarAutorizacionMargenBajo(lines).then(function (okAuth) {
                        if (!okAuth) return;
                        continuarGuardadoAjax(true);
                    });
                    return;
                }
            }

            continuarGuardadoAjax(false);

            function continuarGuardadoAjax(fromAuthModal) {
            if (!isAjaxDocType) {
                return;
            }
            if (fromAuthModal) {
                if (margenAuthError) {
                    margenAuthError.style.display = 'none';
                    margenAuthError.textContent = '';
                }
                if (margenAuthConfirm) {
                    margenAuthConfirm.disabled = true;
                    margenAuthConfirm.textContent = 'Guardando...';
                }
                if (margenAuthCancel) margenAuthCancel.disabled = true;
                if (margenAuthUser) margenAuthUser.disabled = true;
                if (margenAuthPass) margenAuthPass.disabled = true;
            }

            const precioStash = [];
            itemsBody.querySelectorAll('.item-row').forEach(function (row) {
                const f = getRF(row);
                if (!f.priceInput) return;
                const u = effectiveUnitPrecioForSubmit(row);
                if (u != null) {
                    precioStash.push({ el: f.priceInput, was: f.priceInput.value });
                    f.priceInput.value = u.toFixed(2);
                }
            });
            if (typeof window.ensureCsrfForms === 'function') {
                window.ensureCsrfForms(form);
            }
            const formData = new FormData(form);
            function restorePreciosOV() {
                precioStash.forEach(function (s) { s.el.value = s.was; });
            }
            var saveHeaders = { 'X-Requested-With': 'XMLHttpRequest' };
            if (typeof window.getCsrfToken === 'function') {
                var csrfTok = window.getCsrfToken();
                if (csrfTok) saveHeaders['X-CSRF-Token'] = csrfTok;
            }
            if (!fromAuthModal) setFormSaveBusy(true);
            fetch(form.action || window.location.pathname, {
                method: 'POST',
                headers: saveHeaders,
                body: formData
            })
                .then(function (response) {
                    function friendlySaveErrorByDocType(statusCode) {
                        var dt = String(DOC_TYPE || '').toLowerCase();
                        var base = 'No se pudo guardar el documento.';
                        if (dt === 'cotizacion') base = 'No se pudo guardar la cotización.';
                        else if (dt === 'orden_venta') base = 'No se pudo guardar la orden de venta.';
                        else if (dt === 'orden_compra') base = 'No se pudo guardar la orden de compra.';
                        else if (dt === 'factura') base = 'No se pudo guardar la factura.';

                        if (statusCode === 404) return base + ' El documento no existe o fue eliminado.';
                        if (statusCode === 403) return base + ' No tienes permisos para realizar esta acción.';
                        if (statusCode >= 500) return base + ' Ocurrió un error interno en el servidor.';
                        return base + ' Revisa los datos e inténtalo nuevamente.';
                    }

                    var ctype = String(response.headers.get('content-type') || '').toLowerCase();
                    if (ctype.indexOf('application/json') >= 0) {
                        return response.json().then(function (data) {
                            if (!response.ok || !data.success) {
                                throw new Error((data && data.message) || 'No se pudo guardar el documento');
                            }
                            return data;
                        });
                    }
                    // Algunas rutas pueden responder HTML (error o redirect). Evitar error técnico de parse JSON.
                    return response.text().then(function () {
                        // Evitamos exponer HTML/CSS del servidor en UI.
                        throw new Error(friendlySaveErrorByDocType(response.status));
                    });
                })
                .then(function (data) {
                    restorePreciosOV();
                    if (!fromAuthModal) setFormSaveBusy(false);
                    if (docNumberInput && data.doc_number) {
                        docNumberInput.value = data.doc_number;
                    }
                    if (loadedDocumentIdInput && data.doc_id) {
                        loadedDocumentIdInput.value = String(data.doc_id);
                    }
                    if (fromAuthModal && margenAuthModal && margenAuthIntro) {
                        if (margenAuthError) {
                            margenAuthError.style.display = 'none';
                            margenAuthError.textContent = '';
                        }
                        margenAuthIntro.textContent = '';
                        if (margenAuthSuccessBox) margenAuthSuccessBox.style.display = '';
                        if (margenAuthSuccessText) margenAuthSuccessText.textContent = data.message || 'Orden de venta guardada correctamente.';
                        if (margenAuthFormFields) margenAuthFormFields.style.display = 'none';
                        if (margenAuthUser) margenAuthUser.value = '';
                        if (margenAuthPass) margenAuthPass.value = '';
                        if (margenAuthConfirm) margenAuthConfirm.style.display = 'none';
                        if (margenAuthCancel) {
                            margenAuthCancel.textContent = 'Cerrar';
                            margenAuthCancel.classList.add('primary');
                            margenAuthCancel.disabled = false;
                        }
                        if (margenAuthUser) margenAuthUser.disabled = true;
                        if (margenAuthPass) margenAuthPass.disabled = true;
                        window.setTimeout(function () {
                            if (margenAuthModal && margenAuthModal.classList.contains('open')) {
                                closeMargenAuthModal(true);
                            }
                        }, 2000);
                    } else {
                        showInlineToast(data.message || 'Documento guardado correctamente');
                    }
                })
                .catch(function (error) {
                    restorePreciosOV();
                    if (!fromAuthModal) setFormSaveBusy(false);
                    if (fromAuthModal) {
                        if (margenAuthConfirm) {
                            margenAuthConfirm.disabled = false;
                            margenAuthConfirm.textContent = 'Autorizar y guardar';
                        }
                        if (margenAuthCancel) margenAuthCancel.disabled = false;
                        if (margenAuthUser) margenAuthUser.disabled = false;
                        if (margenAuthPass) margenAuthPass.disabled = false;
                        if (margenAuthError) {
                            margenAuthError.style.display = 'block';
                            margenAuthError.textContent = error.message || 'No se pudo guardar el documento';
                        }
                        return;
                    }
                    notifyUi(error.message || 'No se pudo guardar el documento', 'error', 'Error al guardar');
                });
            }
        });
    }
})();
</script>
