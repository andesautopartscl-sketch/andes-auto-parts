    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-start;
    gap: 2px;
    padding: 0 0 1px;
    min-height: 0;
    text-align: left;
}
.sc-chip {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 1px 5px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 700;
    border: 1px solid transparent;
    cursor: default;
}
.sc-chip.ok { background: #dcfce7; color: #166534; border-color: #86efac; }
.sc-chip.zero { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
.sc-chip.act { outline: 1px solid #3b82f6; outline-offset: 1px; }
.table-foot {
    padding: 10px 12px 12px;
    margin: 0;
    border-top: 1px solid #e8eef5;
    background: #fafbfd;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
}
.table-hint { font-size: 11px; color: #94a3b8; }
.cot-footer {
    border-top: 1px solid #dbe3ef;
    padding: 10px 18px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
}
.cot-notes { flex: 1; }
.cot-notes textarea {
    resize: vertical;
    min-height: 62px;
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 8px;
}
.cot-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    min-width: 280px;
    flex-shrink: 0;
}
.cot-actions .btn.primary {
    min-width: 132px;
}
.cot-actions .btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
}
.cot-actions .btn {
    padding: 7px 10px;
    font-size: 12px;
}

/* Shared document action bar (email/whatsapp/resend) */
.doc-actions {
    margin: 8px 18px 0;
    padding: 8px 10px;
    border: 1px solid #dbe3ef;
    border-radius: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
}
.doc-actions.is-soft-hidden,
.cot-actions.is-soft-hidden {
    display: none !important;
}
.doc-actions-title {
    display: flex;
    flex-direction: column;
    gap: 1px;
}
.doc-actions-title .label {
    font-size: 10px;
    font-weight: 800;
    color: #0f172a;
    text-transform: uppercase;
    letter-spacing: .06em;
}
.doc-actions-title .hint {
    font-size: 11px;
    color: #64748b;
}
.doc-actions-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}
.doc-action-btn {
    border: 1px solid transparent;
    border-radius: 9px;
    padding: 7px 10px;
    font-size: 11px;
    font-weight: 700;
    font-family: inherit;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    white-space: nowrap;
}
.doc-action-btn .icon {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.22);
    font-size: 10px;
}
.doc-action-btn.is-primary {
    background: linear-gradient(135deg, #0ea75a 0%, #16a34a 100%);
    color: #fff;
    border-color: #118843;
    box-shadow: 0 6px 16px rgba(22, 163, 74, .22);
}
.doc-action-btn.is-secondary {
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    color: #fff;
    border-color: #1e3a8a;
    box-shadow: 0 6px 16px rgba(30, 64, 175, .20);
}
.doc-action-btn.is-ghost {
    background: #fff;
    color: #0f172a;
    border-color: #cbd5e1;
}
.doc-action-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(15, 23, 42, .14);
}
.doc-action-btn:active {
    transform: translateY(0);
}
.doc-action-btn:disabled,
.doc-action-btn.is-loading {
    opacity: .58;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
.doc-action-modal-box {
    width: min(100%, 520px);
    max-width: 520px;
    gap: 10px;
}
.doc-action-modal-box .pshead h3 {
    font-size: 16px;
}
.doc-action-modal-body {
    padding: 2px 2px 6px;
}
.doc-action-modal-body p {
    margin: 0;
    font-size: 14px;
    line-height: 1.45;
    color: #334155;
    white-space: pre-wrap;
}
#docActionModal[data-tone="error"] .pshead h3 { color: #b91c1c; }
#docActionModal[data-tone="success"] .pshead h3 { color: #166534; }
#docActionModal[data-tone="info"] .pshead h3 { color: #1e40af; }
.psmodal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(15, 23, 42, .55);
    z-index: 60;
}
/* Mapa / auth: por encima del sidebar, chat y contenido con overflow */
#docTraceModal.psmodal,
#relmapAuthModal.psmodal {
    z-index: 1600;
}
.psmodal.open { display: flex; }
.psbox {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #dbe3ef;
    padding: 22px;
    box-shadow: 0 24px 60px rgba(15, 23, 42, .25);
    width: min(100%, 1060px);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
}
.pshead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
.pshead h3 { margin: 0; font-size: 17px; }
.ps-closex {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #64748b;
    line-height: 1;
    padding: 2px 8px;
    border-radius: 8px;
}
.ps-closex:hover { background: #f1f5f9; }
.psbox.erp-trace-box {
    width: min(100%, 960px);
    max-width: 960px;
}
.erp-trace-scroll {
    max-height: min(70vh, 640px);
    min-height: 120px;
}
/* Quitar fila: discreto, profesional */
.erp-table .remove-row-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    margin: 0;
    padding: 0;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #fff;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
}
.erp-table .remove-row-btn:hover {
    border-color: #fecaca;
    color: #b91c1c;
    background: #fff5f5;
}
.erp-table .remove-row-btn:focus-visible {
    outline: none;
    border-color: #93c5fd;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, .2);
}
.ps-toolbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    flex-shrink: 0;
}
.ps-toolbar input {
    border: 1px solid #dbe3ef;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    width: 100%;
}
.ps-hint {
    font-size: 11px;
    color: #94a3b8;
    flex-shrink: 0;
}
.ps-scroll {
    flex: 1;
    overflow: auto;
    border: 1px solid #dbe3ef;
    border-radius: 12px;
    min-height: 200px;
}
.ps-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 860px;
}
.ps-table th {
    position: sticky;
    top: 0;
    z-index: 1;
    padding: 9px 12px;
    background: #f8fafc;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #64748b;
    border-bottom: 1px solid #dbe3ef;
}
.ps-table td {
    padding: 8px 12px;
    font-size: 12px;
    border-bottom: 1px solid #f0f4f8;
    vertical-align: middle;
}
.ps-table tbody tr:hover td { background: #f8fbff; }
.ps-table tbody tr.sel td { background: #eff6ff; }
.ps-spill { display: flex; flex-direction: column; gap: 2px; }
.ps-spill strong { font-size: 12px; color: #0f172a; }
.ps-spill small { font-size: 10px; color: #94a3b8; }
.ps-stk {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
}
.ps-stk.ok { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
.ps-stk.zero { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
.psfoot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 8px;
}
.psfoot .ps-selcount { font-size: 12px; color: #64748b; }
.psfoot .ps-btns { display: flex; gap: 8px; }
.trace-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 55vh;
    overflow: auto;
    border: 1px solid #dbe3ef;
    border-radius: 12px;
    padding: 16px 18px;
    background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
}
.trace-step {
    position: relative;
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    padding-bottom: 18px;
}
.trace-step:last-child {
    padding-bottom: 0;
}
.trace-step:last-child .trace-step-line {
    display: none;
}
.trace-step-rail {
    position: relative;
    display: flex;
    justify-content: center;
}
.trace-step-dot {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: #1d4ed8;
    border: 3px solid #dbeafe;
    margin-top: 8px;
    z-index: 1;
}
.trace-step-line {
    position: absolute;
    top: 24px;
    bottom: -6px;
    width: 2px;
    background: linear-gradient(180deg, #93c5fd 0%, #cbd5e1 100%);
}
.trace-node {
    border: 1px solid #dbe3ef;
    border-radius: 14px;
    background: #fff;
    padding: 12px 14px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
}
.trace-node .row1 {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
}
.trace-node .tag {
    display: inline-flex;
    align-items: center;
    border: 1px solid #bfdbfe;
    color: #1e3a8a;
    background: #eff6ff;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 2px 8px;
}
.trace-node .num {
    font-weight: 700;
    color: #0f172a;
}
.trace-node .meta {
    font-size: 11px;
    color: #64748b;
}
.trace-node .meta-strong {
    color: #0f172a;
    font-weight: 700;
}
.trace-node .trace-pay-line {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed #e2e8f0;
    color: #334155;
}

/* Mapa de relaciones: estilos en static/css/relmap.css */

@media (max-width: 520px) {
    .doc-number-wrap {
        flex-direction: column;
        align-items: stretch;
    }
    .doc-number-wrap .btn {
        align-self: flex-start;
    }
    .doc-num-input,
    #doc_number {
        flex: none;
        width: 100%;
    }
    .cot-totals-zone {
        align-self: stretch;
        max-width: none;
        margin-left: 12px;
        margin-right: 12px;
    }
}
@media (max-width: 800px) {
    .cot-dochead { grid-template-columns: 1fr; }
    .cot-metamode { border-left: none; border-top: 1px solid #dbe3ef; }
    .cot-client-grid { grid-template-columns: 1fr 1fr; }
    .cot-ic-grid { grid-template-columns: 1fr 1fr; }
    .ps-toolbar { grid-template-columns: 1fr; }
    .cot-footer {
        flex-direction: column;
        align-items: stretch;
    }
    .cot-actions {
        min-width: 0;
        justify-content: stretch;
    }
    .cot-actions .btn {
        width: 100%;
    }
    .doc-actions {
        margin: 12px 14px 0;
        align-items: stretch;
    }
    .doc-actions-group {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
    }
    .doc-action-btn {
        width: 100%;
        justify-content: center;
    }
}
